<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>

  

</head>

<body>

 <div id="first-login-container">
  <form id="myform">
    <label for="name">Your Name:</label>
    <input type="text" id="name" name="name" pattern="[a-zA-Z ]+" title="Please enter a valid name" required />

    <label for="Username">Username:</label>
    <input type="text" id="Username" name="Username" minlength="5" maxlength="13" title="Please enter a valid username" pattern="[a-zA-Z0-9]+"  required />

    <label for="Age">Age</label>
    <input type="number" id="Age" name="Age" min="6" max="99" required />
  </form>

  <button type="submit" form="myform" onclick="Submit_1(event)">Submit</button>
</div>

<link href="style.css" rel="stylesheet" type="text/css" />
<script src="fb_setup.js"></script>
<script src="script.js"></script>


</body>

</html>
