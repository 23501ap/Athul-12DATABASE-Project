<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>

 
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

  <div id="first-login-container">
   
    <form onsubmit="Submit_1(event)">
  <input id="name" placeholder="Name" pattern="[A-Za-z]+" title="Only A-Z and a-z allowed" required>
  <input id="username" placeholder="Username" pattern="[A-Za-z0-9_]+" title="Only A-Z, a-z, 0-9, and _ allowed" required>
  <input id="age" placeholder="Age" min="11" max="99" required>
  <button type="submit">Save</button>
</form>
  </div>

</body>
  <script src="script.js"></script>
  

</body>
</html>
